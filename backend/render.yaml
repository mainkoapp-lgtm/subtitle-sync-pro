services:
  - type: web
    name: subtitle-sync-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: IS_PRODUCTION
        value: "true"
      - key: MASTER_API_KEY
        sync: false # User will set this in Render Dashboard
      - key: SMTP_APP_PASSWORD
        sync: false # User will set this in Render Dashboard
      - key: LOG_FILE_PATH
        value: "/tmp/app.log"
